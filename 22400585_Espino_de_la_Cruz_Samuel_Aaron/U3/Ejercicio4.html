<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 4 - Login Facebook</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>

    <div class="Contenedor-Login">
        
        <div class="Izquierda">
            <h1>facebook</h1>
            <p>Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.</p>
        </div>

        <div class="Derecha">
            <form>
                <input type="text" placeholder="Correo electrónico o número de teléfono">
                
                <input type="password" placeholder="Contraseña">
                
                <button type="submit" class="btn-login">Iniciar sesión</button>
                
                <a href="#" class="Pregunta">¿Olvidaste tu contraseña?</a>
                
                <hr>
                
                <button type="button" class="btn-CuentaNueva">Crear cuenta nueva</button>
            </form>
            
            <p class="create-page"><strong>Crear una página</strong> para una celebridad, una marca o un negocio.</p>
        </div>

    </div>

</body>
