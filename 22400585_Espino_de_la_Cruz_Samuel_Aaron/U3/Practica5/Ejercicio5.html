<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Actividad 5 - Google</title>
    <link rel="stylesheet" href="google.css">
</head>

<body>

    <div class="Pagina-Google">

        <div class="ParteSuperior">
            <button type="button" class="btn-enlace">Gmail</button>
            <button type="button" class="btn-enlace">Imágenes</button>
            <button type="button" class="btn-apps"><i class="fa-solid fa-ellipsis-vertical"
                    style="font-size: 16px; letter-spacing: -2px;"></i><i class="fa-solid fa-ellipsis-vertical"
                    style="font-size: 16px; margin-left: 2px;"></i></button>
            <button type="submit" class="btn-Acceder">Acceder</button>
        </div>

        <div class="Contenido-Central">
            <div class="google-logo">
                <span class="g1">G</span>
                <span class="o1">o</span>
                <span class="o2">o</span>
                <span class="g2">g</span>
                <span class="l">l</span>
                <span class="e">e</span>
            </div>

            <div class="Contenedor-Busqueda">
                <div class="Caja-Input">
                    <i class="fa-solid fa-magnifying-glass icono-buscar"></i>
                    <input type="text" placeholder="Ingresa una búsqueda...">
                    <i class="fa-solid fa-microphone icono-voz" title="Buscar por voz"></i>
                    <i class="fa-solid fa-camera icono-camara" title="Buscar por imagen"></i>
                </div>

                <div class="Botones">
                    <button type="submit" class="btn-buscar">Buscar con Google</button>
                    <button type="submit" class="btn-Suerte">Voy a tener suerte</button>
                </div>
            </div>

        </div>

        <div class="Pie-Pagina">
            <div class="Fila-Pais">
                <p>México</p>
            </div>
            <div class="Fila-Enlaces">
                <div class="Enlaces-Izquierda">
                    <p>Sobre Google</p>
                    <p>Publicidad</p>
                    <p>Negocios</p>
                    <p>Cómo funciona la Búsqueda</p>
                </div>
                <div class="Enlaces-Derecha">
                    <p>Privacidad</p>
                    <p>Condiciones</p>
                    <p>Preferencias</p>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
